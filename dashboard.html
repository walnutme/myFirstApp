<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - My App</title>
    <meta name="description" content="My App 대시보드 페이지입니다.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="home-page">
    <div class="container">
        <div class="glass-card">
            <h2 id="welcome-message">환영합니다!</h2>
            <p class="subtitle">성공적으로 로그인 하셨습니다.</p>
            
            <div class="options" style="justify-content: center; margin-top: 40px;">
                <button onclick="handleLogout()" class="btn" style="width: auto; padding: 10px 30px;">로그아웃</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
    <script>
        // 페이지 로드 시 사용자 이름 표시
        window.onload = function() {
            const storedUserStr = localStorage.getItem("user");
            if (storedUserStr) {
                const storedUser = JSON.parse(storedUserStr);
                document.getElementById("welcome-message").innerText = storedUser.username + "님, 환영합니다!";
            } else {
                // 로그인되지 않은 상태면 로그인 페이지로
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
